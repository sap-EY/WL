# Alembic configuration for the wabot project.
#
# Database URL is intentionally NOT set here — `migrations/env.py` reads
# `wabot.infra.config.AppSettings` and uses the DSN from `.env`.

[alembic]
script_location = migrations
prepend_sys_path = src
version_path_separator = os
timezone = UTC
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
